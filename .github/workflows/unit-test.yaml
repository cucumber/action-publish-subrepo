name: Unit tests

on:
  push:

permissions: {}

jobs:
  run-unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - run: python3 -m pip install --user git-filter-repo
      - run: ./test
